- defaults:
    link:
        create: true
        relink: true
        force: true
    shell:
        stderr: true

- clean: ['~', '~/.oh-my-zsh/custom/', '~/.oh-my-zsh/custom/plugins/']

- link:
    ~/.vimrc: vimrc
    ~/.gitignore_global: gitignore_global
    ~/.zshrc: zshrc
    ~/.oh-my-zsh/custom/themes/bullet-train.zsh-theme: oh-my-zsh/themes/bullet-train.zsh-theme
- shell:
    - [sh pre-install.sh, Running pre installation script]
